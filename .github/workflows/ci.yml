name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: windows-latest
            python-version: "3.13"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"
      - name: Compile Python sources
        run: python -m compileall -q noval examples evals
      - name: Run offline test suite
        run: python -m pytest -q

  package:
    name: Build package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install build frontend
        run: python -m pip install build
      - name: Build source and wheel distributions
        run: python -m build
      - name: Install built wheel
        run: python -m pip install dist/*.whl
      - name: Import installed package
        run: python -c "import noval; print(noval.__name__)"

  bubblewrap:
    name: Linux hard-sandbox escapes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NOVAL_REQUIRE_BUBBLEWRAP: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install Bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap apparmor-profiles apparmor-utils
          sudo install -m 0644 \
            /usr/share/apparmor/extra-profiles/bwrap-userns-restrict \
            /etc/apparmor.d/bwrap-userns-restrict
          sudo apparmor_parser -r /etc/apparmor.d/bwrap-userns-restrict
      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run real sandbox escape tests
        run: python -m pytest -q tests/test_bubblewrap.py tests/test_hooks.py
